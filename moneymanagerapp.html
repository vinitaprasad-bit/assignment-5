**LOGIN PAGE CODE**
<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
      color: white;

      /* animated money background */
      background: black;
      overflow: hidden;
    }

    .money {
      position: fixed;
      top: -50px;
      font-size: 24px;
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh);
      }
    }

    .box {
      background: rgba(0,0,0,0.8);
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 0 10px gray;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      margin: 5px;
      background: black;
      color: white;
      border: 1px solid white;
      cursor: pointer;
    }

    .show-pass {
      font-size: 14px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- floating money -->
<script>
for (let i = 0; i < 20; i++) {
  let span = document.createElement("span");
  span.className = "money";
  span.innerText = "💸";
  span.style.left = Math.random() * 100 + "vw";
  span.style.animationDuration = (3 + Math.random() * 5) + "s";
  document.body.appendChild(span);
}
</script>

<div class="box">
  <h2>Login / Signup</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <!-- SHOW PASSWORD -->
  <div class="show-pass" onclick="togglePassword()">👁 Show Password</div>

  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</div>

<script>
function togglePassword() {
  let passField = document.getElementById("password");
  if (passField.type === "password") {
    passField.type = "text";
  } else {
    passField.type = "password";
  }
}

// SIGNUP
function signup() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if (!user || !pass) {
    alert("Enter all details");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  if (users.find(u => u.username === user)) {
    alert("User already exists!");
    return;
  }

  users.push({ username: user, password: pass });
  localStorage.setItem("users", JSON.stringify(users));

  alert("Signup successful! Now login.");
}

// LOGIN
function login() {
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let valid = users.find(u => u.username === user && u.password === pass);

  if (!valid) {
    alert("Invalid username or password");
    return;
  }

  localStorage.setItem("currentUser", user);

  window.location.href = "money1.html";
}
</script>

</body>
</html>

**MAIN PAGE CODE**
<!DOCTYPE html>
<html>
<head>
  <title>Money Manager</title>

  <style>
    body {
      font-family: Arial;
      background: #ffe6f0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #d63384;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .summary {
      display: flex;
      justify-content: space-around;
      background: white;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      padding: 8px 12px;
      margin: 5px;
      cursor: pointer;
      background: #ff4da6;
      color: white;
      border: none;
      border-radius: 5px;
    }

    table {
      width: 100%;
      background: white;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
      text-align: center;
    }

    .popup {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
    }

    .form-box {
      background: white;
      padding: 20px;
      width: 300px;
      margin: 100px auto;
      border-radius: 10px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
    }

    .search-box {
      margin-top: 15px;
      text-align: center;
    }

  </style>

</head>

<body>

<script>
// LOGIN CHECK
const user = localStorage.getItem("currentUser");
if (!user) {
  window.location.href = "front.html";
}
</script>

<div class="top-bar">
  <h2>Welcome, <span id="userName"></span></h2>
  <button onclick="logout()">Logout</button>
</div>

<h1>Money Manager</h1>

<div class="summary">
  <h3>Income: ₹<span id="income">0</span></h3>
  <h3>Expense: ₹<span id="expense">0</span></h3>
  <h3>Balance: ₹<span id="balance">0</span></h3>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search by category or description" onkeyup="searchTxn()">
</div>

<button onclick="openForm()">+ Add Transaction</button>
<button onclick="clearAll()">Clear All</button>

<div id="popup" class="popup">
  <div class="form-box">
    <h2>Add Transaction</h2>

    <input type="number" id="amount" placeholder="Amount">
    <input type="date" id="date">

    <label><input type="radio" name="type" value="income"> Income</label>
    <label><input type="radio" name="type" value="expense"> Expense</label>

    <select id="category">
      <option value="">Select Category</option>
      <option>Salary</option>
      <option>Food</option>
      <option>Shopping</option>
      <option>Rent</option>
      <option>Others</option>
    </select>

    <input type="text" id="desc" placeholder="Description">

    <button onclick="addTransaction()">Save</button>
    <button onclick="closeForm()">Cancel</button>
  </div>
</div>

<table>
<thead>
<tr>
  <th>Date</th>
  <th>Type</th>
  <th>Category</th>
  <th>Description</th>
  <th>Amount</th>
  <th>Action</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<script>
// SHOW USER
document.getElementById("userName").innerText = user;

function logout() {
  localStorage.removeItem("currentUser");
  window.location.href = "login.html";
}

let transactions = JSON.parse(localStorage.getItem(user)) || [];

function saveData() {
  localStorage.setItem(user, JSON.stringify(transactions));
}

function loadData(filtered = transactions) {
  let list = document.getElementById("list");
  list.innerHTML = "";

  let income = 0, expense = 0;

  filtered.forEach(t => {
    let row = `
      <tr>
        <td>${t.date}</td>
        <td>${t.type}</td>
        <td>${t.category}</td>
        <td>${t.desc}</td>
        <td>${t.amount}</td>
        <td>
          <button onclick="deleteTxn(${t.id})">Delete</button>
        </td>
      </tr>
    `;
    list.innerHTML += row;

    if (t.type === "income") income += Number(t.amount);
    else expense += Number(t.amount);
  });

  document.getElementById("income").innerText = income;
  document.getElementById("expense").innerText = expense;
  document.getElementById("balance").innerText = income - expense;
}

function openForm() {
  document.getElementById("popup").style.display = "block";
}

function closeForm() {
  document.getElementById("popup").style.display = "none";
}

function addTransaction() {
  let amount = document.getElementById("amount").value;
  let date = document.getElementById("date").value;
  let type = document.querySelector('input[name="type"]:checked');
  let category = document.getElementById("category").value;
  let desc = document.getElementById("desc").value;

  if (!amount || amount <= 0) {
    alert("Enter valid amount");
    return;
  }

  if (!date) {
    alert("Select date");
    return;
  }

  if (!type) {
    alert("Select type");
    return;
  }

  if (!category) {
    alert("Select category");
    return;
  }

  let txn = {
    id: Date.now(),
    amount,
    date,
    type: type.value,
    category,
    desc
  };

  transactions.push(txn);
  saveData();
  loadData();
  closeForm();
}

function deleteTxn(id) {
  if (confirm("Delete transaction?")) {
    transactions = transactions.filter(t => t.id !== id);
    saveData();
    loadData();
  }
}

function searchTxn() {
  let value = document.getElementById("search").value.toLowerCase();
  let filtered = transactions.filter(t =>
    t.category.toLowerCase().includes(value) ||
    t.desc.toLowerCase().includes(value)
  );
  loadData(filtered);
}

function clearAll() {
  if (confirm("Delete all transactions?")) {
    transactions = [];
    saveData();
    loadData();
  }
}

loadData();
</script>

</body>
</html>
